spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.pool-name=SupabaseSessionPool
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

supabase.jwks.url=${SUPABASE_JWKS_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.url=${SUPABASE_URL}
gemini.api.key=${GEMINI_API_KEY}
kfood.api.base-url=${KFOOD_API_BASE_URL}

gcp.project.id=${GCP_PROJECT_NAME}
gcp.project.location=${GCP_PROJECT_LOCATION}
gcp.gemini.model.name=gemini-2.0-flash-001